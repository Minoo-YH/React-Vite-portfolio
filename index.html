<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- 🔥 Title -->
    <title>Minoo Yaghoubi | Full-stack Developer</title>

    <!-- 📱 Responsive -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- 🔍 SEO -->
    <meta
      name="description"
      content="Portfolio of Minoo Yaghoubi - Full-stack Web & Mobile Developer specializing in modern UI and responsive applications."
    />
    <meta
      name="keywords"
      content="Minoo, Developer, React, Portfolio, Fullstack, Web, Mobile"
    />
    <meta name="author" content="Minoo Yaghoubi" />

    <!-- 🌐 Open Graph (LinkedIn / WhatsApp preview) -->
    <meta property="og:title" content="Minoo Yaghoubi | Developer Portfolio" />
    <meta
      property="og:description"
      content="Modern portfolio showcasing full-stack projects and UI design skills."
    />
    <meta property="og:image" content="/preview.png" />
    <meta property="og:type" content="website" />

    <!-- 🎨 Theme Color -->
    <meta name="theme-color" content="#000000" />

    <!-- 🌟 Favicon -->
    <link rel="icon" type="image/png" href="/m.png" />

    <!-- ✨ Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- 🌌 Initial Style (prevent white flash + space vibe) -->
    <style>
      html,
      body,
      #root {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: radial-gradient(circle at top, #0f172a, #000);
        color: #fff;
        overflow-x: hidden;
      }

      /* ✨ cosmic glow background */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            circle at 20% 20%,
            rgba(34, 197, 94, 0.2),
            transparent 40%
          ),
          radial-gradient(
            circle at 80% 80%,
            rgba(59, 130, 246, 0.2),
            transparent 40%
          );
        z-index: -1;
      }

      /* ⚡ loading screen */
      #loader {
        position: fixed;
        inset: 0;
        background: black;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-size: 1.2rem;
        letter-spacing: 2px;
      }
    </style>
  </head>

  <body>
    <!-- 🚀 Loader -->
    <div id="loader">Loading...</div>

    <!-- ⚛️ React App -->
    <div id="root"></div>

    <!-- 🔥 Hide loader after load -->
    <script>
      window.addEventListener("load", () => {
        const loader = document.getElementById("loader");
        if (loader) loader.style.display = "none";
      });
    </script>

    <!-- ⚛️ React Entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
